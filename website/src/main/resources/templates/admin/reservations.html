<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/admin-head :: head('Admin - Reservations | FlyHigh Restaurant')}"></head>

<body>
    <div class="admin-layout">
        <div th:replace="~{fragments/admin-sidebar :: sidebar('reservations')}"></div>
        <div class="admin-content">
            <div class="content-wrapper">
                <div class="page-header">
                    <h2><i class="fa fa-calendar-check"></i> Reservations</h2>
                </div>
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                    <i class="fa fa-check-circle"></i> <span th:text="${success}"></span>
                    <button type="button" class="close" data-dismiss="alert">&times;</button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                    <i class="fa fa-exclamation-circle"></i> <span th:text="${error}"></span>
                    <button type="button" class="close" data-dismiss="alert">&times;</button>
                </div>
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Guests</th>
                                <th>Date</th>
                                <th>Time</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="res : ${reservations}">
                                <td th:text="${res.id}">1</td>
                                <td th:text="${res.name}"><strong>Name</strong></td>
                                <td th:text="${res.email}">email@example.com</td>
                                <td th:text="${res.phone}">1234567890</td>
                                <td><span class="badge badge-primary" th:text="${res.numOfPeople}">2</span></td>
                                <td th:text="${res.date}">2026-06-15</td>
                                <td th:text="${res.time}">19:00</td>
                                <td>
                                    <a th:href="@{'/admin/reservations/delete/' + ${res.id}}"
                                        class="btn btn-sm btn-danger"
                                        onclick="return confirm('Delete this reservation?')" title="Delete"><i
                                            class="fa fa-trash"></i></a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(reservations)}">
                                <td colspan="8" class="text-center text-muted py-4">No reservations found.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
