<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/admin-head :: head('Admin - Menu Items | FlyHigh Restaurant')}"></head>

<body>
    <div class="admin-layout">
        <div th:replace="~{fragments/admin-sidebar :: sidebar('menu')}"></div>
        <div class="admin-content">
            <div class="content-wrapper">
                <div class="page-header d-flex justify-content-between align-items-center">
                    <h2><i class="fa fa-utensils"></i> Menu Items</h2>
                    <a th:href="@{/admin/menu/add}" class="btn btn-primary"><i class="fa fa-plus"></i> Add New
                        Item</a>
                </div>
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                    <i class="fa fa-check-circle"></i> <span th:text="${success}"></span>
                    <button type="button" class="close" data-dismiss="alert">&times;</button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                    <i class="fa fa-exclamation-circle"></i> <span th:text="${error}"></span>
                    <button type="button" class="close" data-dismiss="alert">&times;</button>
                </div>
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Image</th>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Price</th>
                                <th>Description</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${menuItems}">
                                <td th:text="${item.id}">1</td>
                                <td><img th:src="@{'/images/' + ${item.imagePath}}" alt="food" class="table-img">
                                </td>
                                <td th:text="${item.name}"><strong>Name</strong></td>
                                <td><span class="badge badge-info" th:text="${item.category}">Category</span>
                                </td>
                                <td><strong th:text="${item.price}">$10</strong></td>
                                <td th:text="${item.description}"
                                    style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                                    Desc</td>
                                <td>
                                    <a th:href="@{'/admin/menu/edit/' + ${item.id}}" class="btn btn-sm btn-warning"
                                        title="Edit"><i class="fa fa-edit"></i></a>
                                    <a th:href="@{'/admin/menu/delete/' + ${item.id}}" class="btn btn-sm btn-danger"
                                        onclick="return confirm('Delete this item?')" title="Delete"><i
                                            class="fa fa-trash"></i></a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(menuItems)}">
                                <td colspan="7" class="text-center text-muted py-4">No menu items found. <a
                                        th:href="@{/admin/menu/add}">Add your first item</a></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
