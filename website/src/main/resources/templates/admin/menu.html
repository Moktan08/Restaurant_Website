<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Menu Items | FlyHigh Restaurant</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 bg-dark text-white p-3" style="min-height: 100vh;">
                <h4 class="mb-4">Admin Panel</h4>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link text-white" th:href="@{/admin}"><i
                                class="fa fa-tachometer-alt"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link text-white font-weight-bold" th:href="@{/admin/menu}"><i
                                class="fa fa-utensils"></i> Menu Items</a></li>
                    <li class="nav-item"><a class="nav-link text-white" th:href="@{/admin/staff}"><i
                                class="fa fa-users"></i> Staff</a></li>
                    <li class="nav-item"><a class="nav-link text-white" th:href="@{/admin/reservations}"><i
                                class="fa fa-calendar-check"></i> Reservations</a></li>
                    <li class="nav-item"><a class="nav-link text-white" th:href="@{/admin/messages}"><i
                                class="fa fa-envelope"></i> Messages</a></li>
                    <li class="nav-item mt-4"><a class="nav-link text-white-50" th:href="@{/}"><i
                                class="fa fa-arrow-left"></i> Back to Site</a></li>
                    <li class="nav-item"><a class="nav-link text-danger" th:href="@{/admin/logout}"><i
                                class="fa fa-sign-out-alt"></i> Logout</a></li>
                </ul>
            </div>
            <div class="col-md-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>Menu Items</h2>
                    <a th:href="@{/admin/menu/add}" class="btn btn-primary"><i class="fa fa-plus"></i> Add New Item</a>
                </div>
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                    <span th:text="${success}"></span>
                    <button type="button" class="close" data-dismiss="alert">&times;</button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                    <span th:text="${error}"></span>
                    <button type="button" class="close" data-dismiss="alert">&times;</button>
                </div>
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Image</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Description</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${menuItems}">
                            <td th:text="${item.id}">1</td>
                            <td><img th:src="@{'/images/' + ${item.imagePath}}" alt="food"
                                    style="width:60px;height:60px;object-fit:cover;" class="img-thumbnail"></td>
                            <td th:text="${item.name}">Name</td>
                            <td th:text="${item.category}">Category</td>
                            <td th:text="${item.price}">$10</td>
                            <td th:text="${item.description}">Desc</td>
                            <td>
                                <a th:href="@{'/admin/menu/edit/' + ${item.id}}" class="btn btn-sm btn-warning"><i
                                        class="fa fa-edit"></i></a>
                                <a th:href="@{'/admin/menu/delete/' + ${item.id}}" class="btn btn-sm btn-danger"
                                    onclick="return confirm('Delete this item?')"><i class="fa fa-trash"></i></a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(menuItems)}">
                            <td colspan="7" class="text-center">No menu items found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
