<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/admin-head :: head('Admin Dashboard - FlyHigh Restaurant')}"></head>

<body>
    <div class="admin-layout">
        <div th:replace="~{fragments/admin-sidebar :: sidebar('dashboard')}"></div>
        <div class="admin-content">
            <div class="content-wrapper">
                <div class="page-header">
                    <h2><i class="fa fa-tachometer-alt"></i> Dashboard</h2>
                </div>
                <div class="row">
                    <div class="col-md-3 mb-4">
                        <div class="card stat-card bg-primary text-white">
                            <div class="card-body">
                                <h5 class="card-title"><i class="fa fa-utensils"></i> Menu Items</h5>
                                <h2 th:text="${menuCount}">0</h2>
                                <a th:href="@{/admin/menu}" class="text-white">Manage <i
                                        class="fa fa-arrow-right"></i></a>
                                <div class="stat-icon"><i class="fa fa-utensils"></i></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3 mb-4">
                        <div class="card stat-card bg-success text-white">
                            <div class="card-body">
                                <h5 class="card-title"><i class="fa fa-users"></i> Staff Members</h5>
                                <h2 th:text="${staffCount}">0</h2>
                                <a th:href="@{/admin/staff}" class="text-white">Manage <i
                                        class="fa fa-arrow-right"></i></a>
                                <div class="stat-icon"><i class="fa fa-users"></i></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3 mb-4">
                        <div class="card stat-card bg-warning text-white">
                            <div class="card-body">
                                <h5 class="card-title"><i class="fa fa-calendar-check"></i> Reservations</h5>
                                <h2 th:text="${reservationCount}">0</h2>
                                <a th:href="@{/admin/reservations}" class="text-white">View <i
                                        class="fa fa-arrow-right"></i></a>
                                <div class="stat-icon"><i class="fa fa-calendar-check"></i></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3 mb-4">
                        <div class="card stat-card bg-danger text-white">
                            <div class="card-body">
                                <h5 class="card-title"><i class="fa fa-envelope"></i> Messages</h5>
                                <h2 th:text="${messageCount}">0</h2>
                                <a th:href="@{/admin/messages}" class="text-white">View <i
                                        class="fa fa-arrow-right"></i></a>
                                <div class="stat-icon"><i class="fa fa-envelope"></i></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
<style>
    .admin-layout {
        display: flex;
    }
</style>

</html>
