<div th:fragment="sidebar(activePage)" xmlns:th="http://www.thymeleaf.org">
    <div class="admin-sidebar">
        <h4 class="mb-4 text-center">
            <i class="fa fa-crown"></i> Admin Panel
        </h4>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link text-white"
                    th:classappend="${activePage == 'dashboard'} ? 'font-weight-bold active' : ''" th:href="@{/admin}">
                    <i class="fa fa-tachometer-alt"></i> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white" th:classappend="${activePage == 'menu'} ? 'font-weight-bold active' : ''"
                    th:href="@{/admin/menu}">
                    <i class="fa fa-utensils"></i> Menu Items
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white"
                    th:classappend="${activePage == 'staff'} ? 'font-weight-bold active' : ''"
                    th:href="@{/admin/staff}">
                    <i class="fa fa-users"></i> Staff
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white"
                    th:classappend="${activePage == 'reservations'} ? 'font-weight-bold active' : ''"
                    th:href="@{/admin/reservations}">
                    <i class="fa fa-calendar-check"></i> Reservations
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white"
                    th:classappend="${activePage == 'messages'} ? 'font-weight-bold active' : ''"
                    th:href="@{/admin/messages}">
                    <i class="fa fa-envelope"></i> Messages
                </a>
            </li>
            <li class="nav-item mt-4">
                <a class="nav-link text-white-50" th:href="@{/}">
                    <i class="fa fa-arrow-left"></i> Back to Site
                </a>
            </li>
            <li class="nav-item">
                <form th:action="@{/admin/logout}" method="post">
                    <button type="submit" class="nav-link text-danger btn btn-link"
                        style="border: none; background: none; width: 100%; text-align: left; cursor: pointer;">
                        <i class="fa fa-sign-out-alt"></i> Logout
                    </button>
                </form>
            </li>
        </ul>
    </div>
</div>
