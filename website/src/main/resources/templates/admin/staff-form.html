<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/admin-head :: head('Staff Form | Admin')}"></head>

<body>
    <div class="admin-layout">
        <div th:replace="~{fragments/admin-sidebar :: sidebar('staff')}"></div>
        <div class="admin-content">
            <div class="content-wrapper">
                <a th:href="@{/admin/staff}" class="btn btn-outline-secondary mb-3 back-link"><i
                        class="fa fa-arrow-left"></i> Back to Staff</a>
                <div class="page-header">
                    <h2 th:if="${employee.id != null}"><i class="fa fa-edit"></i> Edit Staff Member</h2>
                    <h2 th:unless="${employee.id != null}"><i class="fa fa-user-plus"></i> Add New Staff Member
                    </h2>
                </div>
                <div class="card form-card mt-3">
                    <div class="card-body">
                        <form
                            th:action="${employee.id != null} ? @{'/admin/staff/edit/' + ${employee.id}} : @{/admin/staff/add}"
                            method="post" enctype="multipart/form-data">
                            <div class="form-row">
                                <div class="form-group col-md-6">
                                    <label for="name">Name *</label>
                                    <input type="text" id="name" name="name" class="form-control"
                                        th:value="${employee.name}" required>
                                </div>
                                <div class="form-group col-md-6">
                                    <label for="role">Role *</label>
                                    <input type="text" id="role" name="role" class="form-control"
                                        th:value="${employee.role}" placeholder="e.g. Head Chef, Waiter, Manager"
                                        required>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group col-md-6">
                                    <label for="employeeType">Type *</label>
                                    <select id="employeeType" name="employeeType" class="form-control" required>
                                        <option value="chef" th:selected="${employee.employeeType == 'chef'}">
                                            Chef
                                        </option>
                                        <option value="other" th:selected="${employee.employeeType == 'other'}">
                                            Other
                                            Staff</option>
                                    </select>
                                </div>
                                <div class="form-group col-md-6">
                                    <label for="imageFile">Image</label>
                                    <input type="file" id="imageFile" name="imageFile" class="form-control-file"
                                        th:unless="${employee.id != null}" required>
                                    <input type="file" id="imageFile" name="imageFile" class="form-control-file"
                                        th:if="${employee.id != null}">
                                    <small class="form-text text-muted" th:if="${employee.id != null}">Leave
                                        empty
                                        to
                                        keep current image.</small>
                                    <div th:if="${employee.imagePath != null}" class="mt-2">
                                        <img th:src="@{'/images/' + ${employee.imagePath}}" alt="current"
                                            style="width:80px;height:80px;object-fit:cover;"
                                            class="img-thumbnail rounded-circle">
                                    </div>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Social Media Links</label>
                            </div>
                            <div class="form-row">
                                <div class="form-group col-md-4">
                                    <label for="facebookUrl"><i class="fab fa-facebook text-primary"></i>
                                        Facebook
                                        URL</label>
                                    <input type="url" id="facebookUrl" name="facebookUrl" class="form-control"
                                        th:value="${employee.facebookUrl}" placeholder="https://facebook.com/...">
                                </div>
                                <div class="form-group col-md-4">
                                    <label for="instagramUrl"><i class="fab fa-instagram text-danger"></i>
                                        Instagram
                                        URL</label>
                                    <input type="url" id="instagramUrl" name="instagramUrl" class="form-control"
                                        th:value="${employee.instagramUrl}" placeholder="https://instagram.com/...">
                                </div>
                                <div class="form-group col-md-4">
                                    <label for="twitterUrl"><i class="fab fa-twitter text-info"></i> Twitter
                                        URL</label>
                                    <input type="url" id="twitterUrl" name="twitterUrl" class="form-control"
                                        th:value="${employee.twitterUrl}" placeholder="https://twitter.com/...">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary"><i class="fa fa-save"></i>
                                Save</button>
                            <a th:href="@{/admin/staff}" class="btn btn-secondary">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
