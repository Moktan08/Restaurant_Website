<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/admin-head :: head('Menu Item Form | Admin')}"></head>

<body>
    <div class="admin-layout">
        <div th:replace="~{fragments/admin-sidebar :: sidebar('menu')}"></div>
        <div class="admin-content">
            <div class="content-wrapper">
                <a th:href="@{/admin/menu}" class="btn btn-outline-secondary mb-3 back-link"><i
                        class="fa fa-arrow-left"></i> Back to Menu Items</a>
                <div class="page-header">
                    <h2 th:if="${menuItem.id != null}"><i class="fa fa-edit"></i> Edit Menu Item</h2>
                    <h2 th:unless="${menuItem.id != null}"><i class="fa fa-plus-circle"></i> Add New Menu Item
                    </h2>
                </div>
                <div class="card form-card mt-3">
                    <div class="card-body">
                        <form
                            th:action="${menuItem.id != null} ? @{'/admin/menu/edit/' + ${menuItem.id}} : @{/admin/menu/add}"
                            method="post" enctype="multipart/form-data">
                            <div class="form-group">
                                <label for="name">Name *</label>
                                <input type="text" id="name" name="name" class="form-control"
                                    th:value="${menuItem.name}" required>
                            </div>
                            <div class="form-group">
                                <label for="description">Description</label>
                                <textarea id="description" name="description" class="form-control" rows="3"
                                    th:text="${menuItem.description}"></textarea>
                            </div>
                            <div class="form-row">
                                <div class="form-group col-md-6">
                                    <label for="price">Price *</label>
                                    <input type="number" step="0.01" id="price" name="price" class="form-control"
                                        th:value="${menuItem.price}" required>
                                </div>
                                <div class="form-group col-md-6">
                                    <label for="category">Category *</label>
                                    <select id="category" name="category" class="form-control" required>
                                        <option value="breakfast" th:selected="${menuItem.category == 'breakfast'}">
                                            Breakfast</option>
                                        <option value="lunch" th:selected="${menuItem.category == 'lunch'}">
                                            Lunch
                                        </option>
                                        <option value="dinner" th:selected="${menuItem.category == 'dinner'}">
                                            Dinner
                                        </option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="imageFile">Image</label>
                                <input type="file" id="imageFile" name="imageFile" class="form-control-file"
                                    th:unless="${menuItem.id != null}" required>
                                <input type="file" id="imageFile" name="imageFile" class="form-control-file"
                                    th:if="${menuItem.id != null}">
                                <small class="form-text text-muted" th:if="${menuItem.id != null}">Leave empty
                                    to
                                    keep
                                    current image.</small>
                                <div th:if="${menuItem.imagePath != null}" class="mt-2">
                                    <img th:src="@{'/images/' + ${menuItem.imagePath}}" alt="current"
                                        style="width:100px;height:100px;object-fit:cover;" class="img-thumbnail">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary"><i class="fa fa-save"></i>
                                Save</button>
                            <a th:href="@{/admin/menu}" class="btn btn-secondary">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
