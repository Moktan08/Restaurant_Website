<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/admin-head :: head('Admin - Messages | FlyHigh Restaurant')}"></head>

<body>
    <div class="admin-layout">
        <div th:replace="~{fragments/admin-sidebar :: sidebar('messages')}"></div>
        <div class="admin-content">
            <div class="content-wrapper">
                <div class="page-header">
                    <h2><i class="fa fa-envelope"></i> Contact Messages</h2>
                </div>
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                    <i class="fa fa-check-circle"></i> <span th:text="${success}"></span>
                    <button type="button" class="close" data-dismiss="alert">&times;</button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                    <i class="fa fa-exclamation-circle"></i> <span th:text="${error}"></span>
                    <button type="button" class="close" data-dismiss="alert">&times;</button>
                </div>
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Subject</th>
                                <th>Message</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="msg : ${messages}">
                                <td th:text="${msg.id}">1</td>
                                <td th:text="${msg.name}"><strong>Name</strong></td>
                                <td th:text="${msg.email}">email@example.com</td>
                                <td th:text="${msg.subject}">Subject</td>
                                <td th:text="${msg.message}"
                                    style="max-width:250px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                                    Message content</td>
                                <td th:text="${msg.createdAt}">2026-06-15</td>
                                <td>
                                    <a th:href="@{'/admin/messages/delete/' + ${msg.id}}" class="btn btn-sm btn-danger"
                                        onclick="return confirm('Delete this message?')" title="Delete"><i
                                            class="fa fa-trash"></i></a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(messages)}">
                                <td colspan="7" class="text-center text-muted py-4">No messages found.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
