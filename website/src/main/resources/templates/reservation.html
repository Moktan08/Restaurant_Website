<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/public-head :: head('Reservation - FlyHigh Restaurant')}"></head>

<body>
    <div th:replace="~{fragments/public-header :: header}"></div>

    <div class="section-gap-top bg-light aos-init aos-animate" id="reservation-container">
        <div class="container">
            <div class="row align-items-center mb-5">
                <div class="col-md-8 text-center">
                    <h2 class="mb-3">Reservation</h2>
                </div>
            </div>
            <div class="row justify-content-center">
                <div class="col-md-10 p-5 form-wrap">
                    <form th:action="@{/reserve}" th:object="${reservation}" method="POST">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="name" class="label">Name</label>
                                    <input type="text" class="form-control" id="name" placeholder="Your Name"
                                        name="name" th:field="*{name}" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="email" class="label">Email</label>
                                    <input type="text" class="form-control" id="email" placeholder="Your Email"
                                        name="email" th:field="*{email}" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="phone" class="label">Phone</label>
                                    <input type="text" class="form-control" id="phone" placeholder="Your Number"
                                        name="phone" th:field="*{phone}" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="number" class="label">Number Of People</label>
                                    <input type="text" class="form-control" id="number" placeholder="Number of Guests"
                                        name="numOfPeople" th:field="*{numOfPeople}" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="date" class="label">Date</label>
                                    <input type="text" class="form-control" id="date" placeholder="Year-Month-Day"
                                        name="date" th:field="*{date}" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="time" class="label">Time</label>
                                    <input type="text" class="form-control" id="time" placeholder="Time" name="time"
                                        th:field="*{time}" required>
                                </div>
                            </div>
                            <div class="col-md-12 mt-3">
                                <div class="form-group">
                                    <input type="submit" value="Make a Reservation" class="btn btn-primary py-3 px-5">
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/public-footer :: footer}"></div>
    <div th:replace="~{fragments/public-scripts :: scripts}"></div>
</body>

</html>
