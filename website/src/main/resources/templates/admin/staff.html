<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/admin-head :: head('Admin - Staff | FlyHigh Restaurant')}"></head>

<body>
    <div class="admin-layout">
        <div th:replace="~{fragments/admin-sidebar :: sidebar('staff')}"></div>
        <div class="admin-content">
            <div class="content-wrapper">
                <div class="page-header d-flex justify-content-between align-items-center">
                    <h2><i class="fa fa-users"></i> Staff Members</h2>
                    <a th:href="@{/admin/staff/add}" class="btn btn-primary"><i class="fa fa-plus"></i> Add New
                        Staff</a>
                </div>
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                    <i class="fa fa-check-circle"></i> <span th:text="${success}"></span>
                    <button type="button" class="close" data-dismiss="alert">&times;</button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                    <i class="fa fa-exclamation-circle"></i> <span th:text="${error}"></span>
                    <button type="button" class="close" data-dismiss="alert">&times;</button>
                </div>

                <h4 class="mb-3"><i class="fa fa-hat-chef text-info"></i> Chefs</h4>
                <div class="table-container mb-5">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Image</th>
                                <th>Name</th>
                                <th>Role</th>
                                <th>Type</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="emp : ${chefs}">
                                <td th:text="${emp.id}">1</td>
                                <td><img th:src="@{'/images/' + ${emp.imagePath}}" alt="staff"
                                        class="table-img-rounded"></td>
                                <td th:text="${emp.name}"><strong>Name</strong></td>
                                <td th:text="${emp.role}">Role</td>
                                <td><span class="badge badge-info">Chef</span></td>
                                <td>
                                    <a th:href="@{'/admin/staff/edit/' + ${emp.id}}" class="btn btn-sm btn-warning"
                                        title="Edit"><i class="fa fa-edit"></i></a>
                                    <a th:href="@{'/admin/staff/delete/' + ${emp.id}}" class="btn btn-sm btn-danger"
                                        onclick="return confirm('Delete this staff member?')" title="Delete"><i
                                            class="fa fa-trash"></i></a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(chefs)}">
                                <td colspan="6" class="text-center text-muted py-4">No chefs found.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <h4 class="mb-3"><i class="fa fa-user-tie text-secondary"></i> Other Staff</h4>
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Image</th>
                                <th>Name</th>
                                <th>Role</th>
                                <th>Type</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="emp : ${others}">
                                <td th:text="${emp.id}">1</td>
                                <td><img th:src="@{'/images/' + ${emp.imagePath}}" alt="staff"
                                        class="table-img-rounded"></td>
                                <td th:text="${emp.name}"><strong>Name</strong></td>
                                <td th:text="${emp.role}">Role</td>
                                <td><span class="badge badge-secondary">Other</span></td>
                                <td>
                                    <a th:href="@{'/admin/staff/edit/' + ${emp.id}}" class="btn btn-sm btn-warning"
                                        title="Edit"><i class="fa fa-edit"></i></a>
                                    <a th:href="@{'/admin/staff/delete/' + ${emp.id}}" class="btn btn-sm btn-danger"
                                        onclick="return confirm('Delete this staff member?')" title="Delete"><i
                                            class="fa fa-trash"></i></a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(others)}">
                                <td colspan="6" class="text-center text-muted py-4">No other staff found.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
