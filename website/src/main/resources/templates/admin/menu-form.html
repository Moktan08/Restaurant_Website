<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:if="${menuItem.id != null}">Edit Menu Item | Admin</title>
    <title th:unless="${menuItem.id != null}">Add Menu Item | Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 bg-dark text-white p-3" style="min-height: 100vh;">
                <h4 class="mb-4">Admin Panel</h4>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link text-white" th:href="@{/admin}"><i
                                class="fa fa-tachometer-alt"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link text-white font-weight-bold" th:href="@{/admin/menu}"><i
                                class="fa fa-utensils"></i> Menu Items</a></li>
                    <li class="nav-item"><a class="nav-link text-white" th:href="@{/admin/staff}"><i
                                class="fa fa-users"></i> Staff</a></li>
                    <li class="nav-item"><a class="nav-link text-white" th:href="@{/admin/reservations}"><i
                                class="fa fa-calendar-check"></i> Reservations</a></li>
                    <li class="nav-item"><a class="nav-link text-white" th:href="@{/admin/messages}"><i
                                class="fa fa-envelope"></i> Messages</a></li>
                    <li class="nav-item mt-4"><a class="nav-link text-white-50" th:href="@{/}"><i
                                class="fa fa-arrow-left"></i> Back to Site</a></li>
                    <li class="nav-item"><a class="nav-link text-danger" th:href="@{/admin/logout}"><i
                                class="fa fa-sign-out-alt"></i> Logout</a></li>
                </ul>
            </div>
            <div class="col-md-10 p-4">
                <a th:href="@{/admin/menu}" class="btn btn-outline-secondary mb-3"><i class="fa fa-arrow-left"></i> Back
                    to Menu Items</a>
                <h2 th:if="${menuItem.id != null}">Edit Menu Item</h2>
                <h2 th:unless="${menuItem.id != null}">Add New Menu Item</h2>
                <div class="card mt-3">
                    <div class="card-body">
                        <form
                            th:action="${menuItem.id != null} ? @{'/admin/menu/edit/' + ${menuItem.id}} : @{/admin/menu/add}"
                            method="post" enctype="multipart/form-data">
                            <div class="form-group">
                                <label for="name">Name *</label>
                                <input type="text" id="name" name="name" class="form-control"
                                    th:value="${menuItem.name}" required>
                            </div>
                            <div class="form-group">
                                <label for="description">Description</label>
                                <textarea id="description" name="description" class="form-control" rows="3"
                                    th:text="${menuItem.description}"></textarea>
                            </div>
                            <div class="form-row">
                                <div class="form-group col-md-6">
                                    <label for="price">Price *</label>
                                    <input type="number" step="0.01" id="price" name="price" class="form-control"
                                        th:value="${menuItem.price}" required>
                                </div>
                                <div class="form-group col-md-6">
                                    <label for="category">Category *</label>
                                    <select id="category" name="category" class="form-control" required>
                                        <option value="breakfast" th:selected="${menuItem.category == 'breakfast'}">
                                            Breakfast</option>
                                        <option value="lunch" th:selected="${menuItem.category == 'lunch'}">Lunch
                                        </option>
                                        <option value="dinner" th:selected="${menuItem.category == 'dinner'}">Dinner
                                        </option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="imageFile">Image</label>
                                <input type="file" id="imageFile" name="imageFile" class="form-control-file"
                                    th:unless="${menuItem.id != null}" required>
                                <input type="file" id="imageFile" name="imageFile" class="form-control-file"
                                    th:if="${menuItem.id != null}">
                                <small class="form-text text-muted" th:if="${menuItem.id != null}">Leave empty to keep
                                    current image.</small>
                                <div th:if="${menuItem.imagePath != null}" class="mt-2">
                                    <img th:src="@{'/images/' + ${menuItem.imagePath}}" alt="current"
                                        style="width:100px;height:100px;object-fit:cover;" class="img-thumbnail">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary"><i class="fa fa-save"></i> Save</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
